<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OCPP Log Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
    .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; }
    .sidebar .brand { color: #00dc82; font-weight: 800; font-size: 1.1rem; padding: 1.5rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar .nav-link { color: rgba(255,255,255,.7); padding: .6rem 1rem; border-radius: 6px; margin: 2px 8px; transition: all .2s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(0,220,130,.15); color: #00dc82; }
    .sidebar .nav-link i { margin-right: 8px; }
    .main-content { flex: 1; padding: 2rem; }
    .badge-HIGH    { background: #dc3545; }
    .badge-MEDIUM  { background: #fd7e14; }
    .badge-LOW     { background: #198754; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 12px; }
    .card-header { background: #fff; border-bottom: 1px solid #eee; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
    .table th { font-size: .8rem; text-transform: uppercase; color: #6c757d; font-weight: 600; }
  </style>
  <th:block layout:fragment="head"></th:block>
</head>
<body>
<div class="d-flex">
  <!-- 사이드바 -->
  <div class="sidebar d-flex flex-column">
    <div class="brand"><i class="bi bi-lightning-charge-fill"></i> OCPP Analyzer</div>
    <nav class="nav flex-column mt-3">
      <a th:href="@{/dashboard}" class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/dashboard')} ? 'active'">
        <i class="bi bi-speedometer2"></i> 대시보드
      </a>
      <a th:href="@{/log}" class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/log')} ? 'active'">
        <i class="bi bi-file-earmark-text"></i> 로그 분석
      </a>
      <a th:href="@{/pattern}" class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/pattern')} ? 'active'">
        <i class="bi bi-shield-exclamation"></i> 장애 패턴
      </a>
    </nav>
    <div class="mt-auto p-3" style="font-size:.7rem;color:rgba(255,255,255,.3);">v1.0.0 · Hackathon 2025</div>
  </div>
  <!-- 본문 -->
  <div class="main-content">
    <th:block layout:fragment="content"></th:block>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
