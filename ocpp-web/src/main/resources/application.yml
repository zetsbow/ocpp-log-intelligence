server:
  port: 7777

spring:
  application:
    name: ocpp-web
  datasource:
    url: jdbc:mysql://59.15.133.144:16000/CSMS?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: csmsoper
    password: csmsoper121
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ocpp-web-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ocpp.web.dto
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

engine:
  url: http://127.0.0.1:7778

ocpp:
  log:
    upload-dir: ./logs/upload
  web:
    # engine이 파일을 다운로드할 때 사용하는 web 서버 base URL
    # web과 engine이 동일 서버이므로 127.0.0.1 사용
    # 운영 서버 분리 배포 시 실제 IP 또는 도메인으로 변경
    # 예) http://192.168.1.10:7777
    base-url: http://127.0.0.1:7777

logging:
  level:
    com.ocpp: DEBUG
    org.mybatis: DEBUG
