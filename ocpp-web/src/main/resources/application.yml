server:
  port: 7777

spring:
  application:
    name: ocpp-web
  datasource:
    url: jdbc:mysql://59.15.133.144:16000/CSMS?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: csmsoper
    password: csmsoper121
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ocpp-web-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ocpp.web.dto
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

engine:
  url: http://localhost:7778

# 업로드된 로그 파일이 저장될 서버 경로 (engine과 공유)
ocpp:
  log:
    upload-dir: C:/ocpp-logs/upload
    archive-dir: C:/ocpp-logs/archive

logging:
  level:
    com.ocpp: DEBUG
    org.mybatis: DEBUG
