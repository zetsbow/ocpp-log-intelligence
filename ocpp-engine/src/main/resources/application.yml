server:
  port: 7778

spring:
  application:
    name: ocpp-engine
  datasource:
    url: jdbc:mysql://59.15.133.144:16000/CSMS?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: csmsoper
    password: csmsoper121
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ocpp-engine-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ocpp.engine.dto
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

ocpp:
  log:
    # web과 동일 서버이므로 같은 상대경로 사용
    # engine 실행 위치/logs/upload → web의 저장 경로와 일치시켜야 함
    # 운영 배포 시 두 모듈을 같은 디렉토리에서 실행하거나
    # 절대 경로로 맞춰주면 됨 (아래 주석 참고)
    upload-dir: ./logs/upload
    # 절대 경로 예시 (운영 서버 배포 시):
    # upload-dir: /home/ocpp/app/logs/upload

logging:
  level:
    com.ocpp: DEBUG
    org.mybatis: DEBUG
