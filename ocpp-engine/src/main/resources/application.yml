server:
  port: 7778
  tomcat:
    max-http-form-post-size: 200MB

spring:
  servlet:
    multipart:
      max-request-size: 200MB
      max-file-size: 200MB
  application:
    name: ocpp-engine
  datasource:
    url: jdbc:mysql://59.15.133.144:16000/CSMS?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: csmsoper
    password: csmsoper121
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ocpp-engine-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ocpp.engine.dto
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

ocpp:
  log:
    upload-dir: ./logs/upload
  web:
    # 파일 다운로드 시 사용하는 ocpp-web 서버 base URL
    # 동일 서버 배포 시: http://127.0.0.1:7777
    # 서버 분리 배포 시: http://실제서버IP:7777
    base-url: http://127.0.0.1:7777

logging:
  level:
    com.ocpp: DEBUG
    org.mybatis: DEBUG
